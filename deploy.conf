# Deployment configuration for EcoAssistant-like Docker Compose project.
# Copy this file to deploy.conf and edit values for the target server.

# Main project paths. Use full paths. Example for non-root deployment: /home/eco/ecoassistant_scrpt
PROJECT_DIR="/home/ecoassistant/ecoassistant_scrpt"
PROJECT_USER="ecoassistant"
COMPOSE_FILE="/home/ecoassistant/ecoassistant_scrpt/docker-compose.yml"
ENV_FILE="/home/ecoassistant/ecoassistant_scrpt/.env"
ENV_TEMPLATE_FILE="/home/ecoassistant/ecoassistant_scrpt/.env.example"
IMAGE_ARCHIVE_DIR="/home/ecoassistant/ecoassistant_scrpt/images"
BACKUP_DIR="/home/ecoassistant/ecoassistant_scrpt/backups"
DB_DUMP_FILE="/home/ecoassistant/ecoassistant_scrpt/backups/dump.sql"
LOG_DIR="/home/ecoassistant/ecoassistant_scrpt/logs"

# Ports that should be checked before deployment.
REQUIRED_PORTS="80"

# Database settings.
# Supported DB_TYPE values: postgres, mysql, mariadb
DB_TYPE="postgres"
DB_SERVICE="db"
DB_NAME="ecoassistant"
DB_USER="postgres"
DB_PASSWORD_ENV_NAME="POSTGRES_PASSWORD"
# DB_PASSWORD can be empty: then scripts will try to read POSTGRES_PASSWORD from ENV_FILE.
DB_PASSWORD=""

# Tables for validation after dump restore.
# Use actual table names from your project, for example:
# CHECK_TABLES="users documents messages"
CHECK_TABLES=""

# Compose/backend service names.
BACKEND_SERVICE="backend"

# HTTP checks after startup.
HTTP_ROOT_URL="http://127.0.0.1/"
FAISS_STATUS_URL="http://127.0.0.1/faiss_status"
# Optional separate backend endpoint, for example: http://127.0.0.1:8000/health
BACKEND_HEALTH_URL=""

# Tokens are normally read from ENV_FILE.
TELEGRAM_BOT_TOKEN=""
MAX_API_TOKEN=""
# MAX API endpoint is project-specific. Set only if you have a safe check endpoint.
MAX_API_CHECK_URL=""

# Optional retag rules after docker load.
# Format: "old_tag=new_tag old_tag2=new_tag2"
RETAG_RULES=""

# Source server settings. scripts/00_copy_archives.sh is run on the NEW/TARGET server
# and pulls compose/env/support files plus existing Docker image archives from the OLD/SOURCE server.
SOURCE_SERVER_HOST="194.156.118.21"
SOURCE_SERVER_USER="root"
SOURCE_SERVER_PORT="22"
SOURCE_SERVER_PROJECT_DIR="/opt/ecoassistant"
SOURCE_SERVER_IMAGE_DIR="/opt/ecoassistant/images"
SOURCE_SERVER_BACKUP_DIR="/opt/ecoassistant/backups"
# Optional SSH private key path on the target server. Leave empty to use password/agent auth.
SOURCE_SERVER_SSH_KEY=""
# Optional extra SSH options, for example: -o StrictHostKeyChecking=accept-new
SOURCE_SERVER_SSH_OPTIONS=""

# Project synchronization settings.
# .env contains secrets; for deployment migration it is usually copied, but keep it out of Git.
COPY_ENV_FROM_SOURCE="true"
# Files copied from SOURCE_SERVER_PROJECT_DIR to PROJECT_DIR if they exist.
SYNC_PROJECT_FILES="docker-compose.yml compose.yml .env .env.example"
# Directories copied from SOURCE_SERVER_PROJECT_DIR to PROJECT_DIR if they exist.
# Add here any project-specific bind-mount directories from docker-compose.yml.
SYNC_PROJECT_DIRS="nginx config configs certbot data prompts faiss"

# Optional DB dump copy. This only copies an already existing dump; it does not create one.
COPY_DB_DUMP_FROM_SOURCE="false"
SOURCE_DB_DUMP_FILE="/opt/ecoassistant/backups/dump.sql"
